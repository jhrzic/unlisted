[build]
  command = "npm run build"
  publish = "public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"
  included_files = ["views/**"]
  external_node_modules = ["express", "ejs"]

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200
